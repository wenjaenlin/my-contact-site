<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>把你的名字，交給小新</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page-shell">
    <section class="hero-panel">
      <p class="eyebrow">A name, carried gently</p>
      <h1>把你的名字，交給小新</h1>
      <p class="intro">
        古人寫月寫風，今夜我們寫她。<br>
        你只需把名字交給我——<br>
        小新會替它添上回聲、添上餘韻。
      </p>
    </section>

    <section class="mood-panel" aria-live="polite" aria-busy="false">
      <div class="mood-heading">
        <p class="section-kicker">今天的心情</p>
        <h2>先讓小新替今天，留下一句很輕的回聲。</h2>
      </div>

      <div class="mood-actions">
        <button id="generate-mood-button" type="button" class="secondary-button">今天的心情</button>
      </div>

      <div id="mood-content" class="mood-content">
        <p class="mood-placeholder">按下按鈕，聽聽今天想對你說的一句話。</p>
      </div>
    </section>

    <section class="form-panel">
      <div class="form-heading">
        <p class="section-kicker">名字新詩產生器</p>
        <h2>把一個名字放進來，讓它長成一首詩。</h2>
      </div>

      <form
        id="poem-form"
        class="poem-form"
        name="poem-request"
        method="POST"
        data-netlify="true"
        netlify-honeypot="bot-field"
      >
        <input type="hidden" name="form-name" value="poem-request">
        <p class="hidden-field">
          <label>
            請不要填寫這個欄位：
            <input name="bot-field">
          </label>
        </p>

        <label class="field">
          <span>你的名字</span>
          <input id="name-input" type="text" name="name" placeholder="請寫下你的名字" maxlength="40" required>
        </label>

        <button type="submit" class="submit-button">請小新寫詩</button>
      </form>
    </section>

    <section id="result-panel" class="result-panel" aria-live="polite" aria-busy="false">
      <p class="section-kicker">詩的回聲</p>
      <div id="result-content" class="result-content">
        <p class="result-placeholder">你的名字會在這裡慢慢長出一首詩。</p>
      </div>

      <div id="image-actions" class="image-actions hidden">
        <button id="generate-image-button" type="button" class="secondary-button">生成意象圖</button>
      </div>

      <div id="image-panel" class="image-panel hidden" aria-live="polite" aria-busy="false">
        <p class="section-kicker">意象圖</p>
        <div id="image-content" class="image-content"></div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
