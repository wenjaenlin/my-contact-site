<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>把你的名字，交給小新</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page-shell">
    <section class="hero-panel">
      <p class="eyebrow">A name, carried gently</p>
      <h1>把你的名字，交給小新</h1>
      <p class="intro">
        古人寫月寫風，今夜我們寫她。<br>
        你只需把名字交給我——<br>
        小新會替它添上回聲、添上餘韻。
      </p>
    </section>

    <section class="form-panel">
      <div class="form-heading">
        <p class="section-kicker">留下聯絡方式</p>
        <h2>讓名字落款，也讓故事開始。</h2>
      </div>

      <form
        id="contact-form"
        class="contact-form"
        name="contact"
        method="POST"
        action="/thank-you.html"
        data-netlify="true"
        netlify-honeypot="bot-field"
      >
        <input type="hidden" name="form-name" value="contact">
        <p class="hidden-field">
          <label>
            請不要填寫這個欄位：
            <input name="bot-field">
          </label>
        </p>

        <label class="field">
          <span>你的名字</span>
          <input type="text" name="name" placeholder="請寫下你的名字" required>
        </label>

        <label class="field">
          <span>你的信箱</span>
          <input type="email" name="email" placeholder="name@example.com" required>
        </label>

        <button type="submit" class="submit-button">把名字交給小新</button>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
